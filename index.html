<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Imagem grande -->
  <img src="img/consulta.png" alt="consulta" class="bg-imagem">

  <!-- Chat -->
  <div class="chat-container">
    <div class="chat-header">💬 Suporte</div>

    <div class="chat-body" id="chatBody">
      <!-- Mensagens aparecem aqui -->
    </div>

    <div class="chat-footer">
      <input type="text" id="msgInput" placeholder="Digite sua mensagem...">
      <button onclick="enviarMsg()">Enviar</button>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
